<div class="landscape" [class]="'landscape--' + period()">
  @switch (period()) {
    @case ('morning') {
      <svg viewBox="0 0 390 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skyMorning" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFF3CD"/>
            <stop offset="100%" stop-color="#FFE0A3"/>
          </linearGradient>
        </defs>
        <rect width="390" height="160" fill="url(#skyMorning)"/>
        <!-- Sol -->
        <circle cx="320" cy="50" r="28" fill="#FFB347" opacity="0.9"/>
        <circle cx="320" cy="50" r="38" fill="#FFB347" opacity="0.2"/>
        <!-- Colinas -->
        <ellipse cx="80" cy="170" rx="140" ry="60" fill="#6DBE6D" opacity="0.8"/>
        <ellipse cx="300" cy="175" rx="160" ry="55" fill="#5AAD5A" opacity="0.9"/>
        <!-- Nubes -->
        <ellipse cx="100" cy="45" rx="45" ry="18" fill="white" opacity="0.8"/>
        <ellipse cx="130" cy="38" rx="30" ry="15" fill="white" opacity="0.8"/>
        <ellipse cx="200" cy="55" rx="35" ry="14" fill="white" opacity="0.6"/>
      </svg>
    }
    @case ('afternoon') {
      <svg viewBox="0 0 390 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skyAfternoon" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#87CEEB"/>
            <stop offset="100%" stop-color="#B0E0FF"/>
          </linearGradient>
        </defs>
        <rect width="390" height="160" fill="url(#skyAfternoon)"/>
        <circle cx="300" cy="40" r="32" fill="#FFD700" opacity="0.95"/>
        <circle cx="300" cy="40" r="44" fill="#FFD700" opacity="0.15"/>
        <ellipse cx="70"  cy="170" rx="130" ry="55" fill="#4CAF50" opacity="0.85"/>
        <ellipse cx="290" cy="175" rx="170" ry="58" fill="#388E3C" opacity="0.9"/>
        <ellipse cx="110" cy="42" rx="50" ry="20" fill="white" opacity="0.75"/>
        <ellipse cx="145" cy="34" rx="32" ry="16" fill="white" opacity="0.75"/>
        <ellipse cx="210" cy="52" rx="38" ry="15" fill="white" opacity="0.55"/>
      </svg>
    }
    @case ('evening') {
      <svg viewBox="0 0 390 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skyEvening" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FF6B6B"/>
            <stop offset="50%" stop-color="#FFA552"/>
            <stop offset="100%" stop-color="#FFD580"/>
          </linearGradient>
        </defs>
        <rect width="390" height="160" fill="url(#skyEvening)"/>
        <circle cx="60" cy="90" r="36" fill="#FF8C00" opacity="0.85"/>
        <circle cx="60" cy="90" r="50" fill="#FF8C00" opacity="0.15"/>
        <ellipse cx="100" cy="172" rx="150" ry="58" fill="#2D5A27" opacity="0.95"/>
        <ellipse cx="310" cy="175" rx="150" ry="52" fill="#1E3D1A" opacity="0.95"/>
        <!-- Pájaros -->
        <path d="M160 55 Q165 50 170 55" stroke="#333" stroke-width="1.5" fill="none"/>
        <path d="M180 45 Q185 40 190 45" stroke="#333" stroke-width="1.5" fill="none"/>
        <path d="M200 60 Q205 55 210 60" stroke="#333" stroke-width="1.5" fill="none"/>
      </svg>
    }
    @case ('night') {
      <svg viewBox="0 0 390 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="skyNight" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0D1B2A"/>
            <stop offset="100%" stop-color="#1B2D45"/>
          </linearGradient>
        </defs>
        <rect width="390" height="160" fill="url(#skyNight)"/>
        <!-- Estrellas -->
        <circle cx="40"  cy="20" r="1.5" fill="white" opacity="0.9"/>
        <circle cx="90"  cy="35" r="1"   fill="white" opacity="0.7"/>
        <circle cx="150" cy="15" r="2"   fill="white" opacity="0.8"/>
        <circle cx="210" cy="30" r="1.5" fill="white" opacity="0.9"/>
        <circle cx="260" cy="18" r="1"   fill="white" opacity="0.6"/>
        <circle cx="310" cy="28" r="1.5" fill="white" opacity="0.8"/>
        <circle cx="355" cy="12" r="1"   fill="white" opacity="0.7"/>
        <circle cx="130" cy="45" r="1"   fill="white" opacity="0.5"/>
        <circle cx="340" cy="45" r="1.5" fill="white" opacity="0.6"/>
        <!-- Luna -->
        <circle cx="320" cy="45" r="22" fill="#FFF5C0" opacity="0.95"/>
        <circle cx="332" cy="38" r="18" fill="#1B2D45"/>
        <!-- Colinas oscuras -->
        <ellipse cx="80"  cy="175" rx="150" ry="55" fill="#0A1628" opacity="0.95"/>
        <ellipse cx="300" cy="178" rx="160" ry="52" fill="#071020" opacity="0.95"/>
      </svg>
    }
  }
</div>
