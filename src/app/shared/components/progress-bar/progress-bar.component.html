<div class="progress">
  @if (showLabel()) {
    <div class="progress__label">
      <span>{{ done() }} of {{ total() }} tasks</span>
      <span class="progress__percent">{{ percent() }}%</span>
    </div>
  }
  <div class="progress__track">
    <div class="progress__fill" [style.width.%]="percent()"></div>
  </div>
</div>
