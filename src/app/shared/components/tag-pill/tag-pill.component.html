<span class="pill" [style.background]="tag().color + '22'" [style.color]="tag().color" [style.border-color]="tag().color + '44'">
  {{ tag().label }}
  @if (removable()) {
    <button class="pill__remove" (click)="removed.emit(tag().id)" aria-label="Remove tag">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  }
</span>
